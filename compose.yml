version: "3.9"

# ───── reusable blocks ────────────────────────────────────────────────
x-backend-env: &backend-env
  environment:
    - DATABASE_URL=sqlite:///./store.db
    - FX_API_KEY=${FX_API_KEY:-}
    - ALLOWED_CURRENCIES=${ALLOWED_CURRENCIES:-USD,GBP,EUR,AUD,MXN,JPY}
    - FX_CACHE_TTL_HOURS=${FX_CACHE_TTL_HOURS:-1}
    - DEBUG=${DEBUG:-true}

x-frontend-env: &frontend-env
  environment:
    - VITE_API_URL=http://localhost:8001
    - VITE_DEFAULT_CURRENCY=${VITE_DEFAULT_CURRENCY:-USD}

# ───── services ───────────────────────────────────────────────────────
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    <<: *backend-env
    command: uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8001
    ports: ["8001:8001"]
    volumes:
      - ./backend:/app
      - /app/.venv
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    <<: *frontend-env
    command: npm run dev -- --host 0.0.0.0
    ports: ["3001:3001"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on: [backend]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  e2e:
    image: mcr.microsoft.com/playwright:v1.55.0-noble
    volumes:
      - ./frontend:/app
      - ./e2e-reports:/app/test-results
    working_dir: /app
    environment:
      - VITE_API_URL=http://backend:8001
      - CI=true
    depends_on:
      - backend
      - frontend
    profiles: ["test"]
    command: ["npx", "playwright", "test", "--config=playwright.config.ci.ts"]

# ───── named volumes ─────────────────────────────────────────────────
volumes: {}
